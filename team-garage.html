<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garage — Pitwall</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="config.js"></script>
<script src="pitwall.js"></script>
<script src="sidebar.js"></script>
<script src="stint-engine.js"></script>
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #111111;
  --card:     #1a1a1a;
  --card-hi:  #222222;
  --surface:  #141414;
  --border:   #2a2a2a;
  --border-hi:#383838;
  --text:     #FFFFFF;
  --muted:    #666666;
  --muted-hi: #999999;
  --lime:     #C8FF00;
  --lime-dim: rgba(200,255,0,0.07);
  --red:      #ef4444;
  --orange:   #f97316;
  --blue:     #3b82f6;
  --black:    #000000;
}

html, body { height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:'Barlow',sans-serif; -webkit-font-smoothing:antialiased; }
::-webkit-scrollbar { width:5px; } ::-webkit-scrollbar-track { background:transparent; } ::-webkit-scrollbar-thumb { background:#2a2a2a; border-radius:3px; } ::-webkit-scrollbar-thumb:hover { background:#3a3a3a; }

.app-shell { display:flex; height:100vh; overflow:hidden; }
.main-content { flex:1; display:flex; flex-direction:column; height:100%; overflow:hidden; }
.scroll-area { flex:1; overflow-y:auto; padding:0 40px 80px; }

.topbar { display:flex; justify-content:flex-end; align-items:center; padding:20px 40px; gap:12px; flex-shrink:0; }
.topbar-btn { padding:10px; background:rgba(0,0,0,0.4); border:1px solid rgba(255,255,255,0.08); border-radius:12px; color:var(--muted-hi); cursor:pointer; transition:all .2s; backdrop-filter:blur(12px); display:flex; align-items:center; gap:8px; }
.topbar-btn:hover { background:rgba(0,0,0,0.6); color:var(--text); }

.page-content { max-width:1100px; margin:0 auto; }

.page-header { display:flex; align-items:flex-end; justify-content:space-between; gap:20px; margin-bottom:28px; margin-top:8px; padding-bottom:24px; border-bottom:1px solid var(--border); }
.page-eyebrow { font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:.25em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
.page-title { font-family:'Barlow Condensed',sans-serif; font-size:40px; font-weight:900; text-transform:uppercase; line-height:1; letter-spacing:-.01em; }
.page-title span { color:var(--lime); }
.page-subtitle { font-size:13px; color:var(--muted-hi); margin-top:8px; line-height:1.5; max-width:500px; }
.page-header-actions { display:flex; gap:10px; align-items:center; flex-shrink:0; }

.filter-bar { display:flex; gap:8px; margin-bottom:24px; flex-wrap:wrap; align-items:center; }
.filter-btn { padding:6px 14px; background:transparent; border:1px solid var(--border); border-radius:999px; font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--muted-hi); cursor:pointer; transition:all .15s; }
.filter-btn:hover { border-color:var(--border-hi); color:var(--text); }
.filter-btn.active { background:var(--lime-dim); border-color:var(--lime); color:var(--lime); }
.filter-search { margin-left:auto; position:relative; display:flex; align-items:center; }
.filter-search svg { position:absolute; left:10px; color:var(--muted); pointer-events:none; }
.filter-search input { background:var(--card); border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:'Barlow',sans-serif; font-size:13px; padding:7px 12px 7px 32px; outline:none; width:200px; transition:border-color .15s; }
.filter-search input:focus { border-color:var(--lime); }
.filter-search input::placeholder { color:var(--muted); }

.garage-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(260px, 1fr)); gap:12px; }

/* ── LIVERY CARD ── */
.livery-card { background:var(--card); border:1px solid var(--border); border-radius:12px; overflow:hidden; transition:border-color .2s, transform .15s; }
.livery-card:hover { border-color:var(--border-hi); transform:translateY(-1px); }
.livery-card-accent { height:2px; width:100%; }
.livery-card-visual { height:110px; background:#0d0d0d; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; padding:12px 16px; }
.livery-card-visual::after { content:''; position:absolute; inset:0; background:linear-gradient(to bottom, transparent 60%, var(--card)); pointer-events:none; }
.livery-car-img { max-height:88px; max-width:100%; object-fit:contain; filter:drop-shadow(0 6px 16px rgba(0,0,0,.7)); transition:transform .3s; }
.livery-card:hover .livery-car-img { transform:scale(1.05); }
.livery-car-placeholder { display:flex; flex-direction:column; align-items:center; gap:8px; color:var(--border-hi); }
.livery-car-placeholder span { font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); font-family:'Barlow Condensed',sans-serif; }
.livery-card-body { padding:12px 14px 10px; }
.livery-card-name { font-family:'Barlow Condensed',sans-serif; font-size:17px; font-weight:900; text-transform:uppercase; letter-spacing:.02em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:6px; }
.livery-card-tags { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:8px; }
.lc-tag { padding:2px 7px; border-radius:3px; font-size:9px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; }
.lc-tag-car    { background:rgba(255,255,255,.05); border:1px solid var(--border-hi); color:var(--muted-hi); }
.lc-tag-series { background:var(--lime-dim); border:1px solid rgba(200,255,0,.2); color:var(--lime); }
.livery-card-url { font-size:10px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-family:monospace; }
.livery-card-footer { padding:8px 14px 10px; display:flex; gap:6px; }
.lc-btn { flex:1; padding:6px 0; background:transparent; border:1px solid var(--border); border-radius:6px; font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--muted-hi); cursor:pointer; transition:all .15s; display:flex; align-items:center; justify-content:center; gap:5px; }
.lc-btn:hover { background:var(--lime-dim); border-color:var(--lime); color:var(--lime); }
.lc-btn.danger:hover { background:rgba(239,68,68,.08); border-color:var(--red); color:var(--red); }

/* ── ADD CARD ── */
.livery-add-card { border:2px dashed var(--border); border-radius:12px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; cursor:pointer; transition:all .2s; min-height:220px; background:transparent; }
.livery-add-card:hover { border-color:var(--lime); background:var(--lime-dim); }
.livery-add-card:hover .add-icon-circle { border-color:var(--lime); color:var(--lime); }
.livery-add-card:hover .add-label { color:var(--lime); }
.add-icon-circle { width:40px; height:40px; border:2px solid var(--border-hi); border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--muted-hi); transition:all .2s; }
.add-label { font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--muted-hi); transition:color .2s; }

/* ── EMPTY ── */
.empty-state { display:flex; flex-direction:column; align-items:center; padding:60px 24px; gap:12px; color:var(--muted); text-align:center; grid-column:1/-1; }
.empty-state-icon { color:var(--border-hi); margin-bottom:8px; }
.empty-state-title { font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--muted-hi); }
.empty-state-sub { font-size:13px; max-width:340px; line-height:1.6; }

/* ── BUTTONS ── */
.btn-primary { background:var(--lime); color:#000; padding:10px 20px; border-radius:999px; font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; cursor:pointer; border:none; transition:all .2s; display:flex; align-items:center; gap:6px; }
.btn-primary:hover { background:#d9ff26; transform:translateY(-1px); }
.btn-ghost { background:transparent; color:var(--muted-hi); padding:10px 20px; border-radius:999px; font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; cursor:pointer; border:1px solid var(--border); transition:all .2s; display:flex; align-items:center; gap:6px; }
.btn-ghost:hover { color:var(--text); border-color:var(--border-hi); }

/* ── MODAL ── */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.85); backdrop-filter:blur(8px); display:none; align-items:center; justify-content:center; z-index:1000; }
.modal-overlay.active { display:flex; }
.modal { background:#1a1a1a; border:1px solid var(--border-hi); border-radius:16px; padding:28px 32px 24px; width:90%; max-width:500px; box-shadow:0 24px 80px rgba(0,0,0,.7); position:relative; }
.modal-close { position:absolute; top:16px; right:16px; width:28px; height:28px; background:transparent; border:none; color:var(--muted); cursor:pointer; border-radius:6px; display:flex; align-items:center; justify-content:center; transition:all .15s; }
.modal-close:hover { background:rgba(255,255,255,.07); color:var(--text); }
.modal-title { font-family:'Barlow Condensed',sans-serif; font-size:26px; font-weight:900; text-transform:uppercase; letter-spacing:.02em; margin-bottom:20px; }
.modal-preview { width:100%; height:100px; background:#0d0d0d; border:1px solid var(--border); border-radius:10px; display:flex; align-items:center; justify-content:center; margin-bottom:20px; overflow:hidden; }
.modal-preview img { max-height:84px; max-width:100%; object-fit:contain; filter:drop-shadow(0 4px 16px rgba(0,0,0,.6)); }
.preview-empty { display:flex; flex-direction:column; align-items:center; gap:8px; color:var(--muted); font-size:11px; font-family:'Barlow Condensed',sans-serif; font-weight:700; letter-spacing:.1em; text-transform:uppercase; }
.form-group { margin-bottom:16px; }
.form-label { display:block; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.15em; color:var(--muted); margin-bottom:7px; }
.form-input { width:100%; padding:10px 14px; background:#111; border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:'Barlow',sans-serif; font-size:14px; outline:none; transition:border-color .15s; }
.form-input:focus { border-color:var(--lime); }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.form-hint { font-size:10px; color:var(--muted); margin-top:5px; line-height:1.5; }
.form-hint a { color:var(--lime); text-decoration:none; }
.form-warn { display:none; font-size:10px; font-weight:700; color:var(--orange); margin-top:6px; padding:7px 10px; background:rgba(249,115,22,.08); border:1px solid rgba(249,115,22,.2); border-radius:6px; }
.series-btns { display:flex; gap:8px; }
.series-btn { padding:7px 14px; background:transparent; border:1px solid var(--border); border-radius:6px; color:var(--muted-hi); font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; cursor:pointer; transition:all .15s; display:flex; align-items:center; gap:6px; }
.series-btn:hover { border-color:var(--border-hi); color:var(--text); }
.series-btn.active { border-color:var(--lime); color:var(--lime); background:var(--lime-dim); }
.modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:24px; padding-top:16px; border-top:1px solid var(--border); }

/* ── TOAST ── */
#toast { position:fixed; bottom:24px; right:24px; padding:12px 22px; border-radius:10px; font-family:'Barlow Condensed',sans-serif; font-size:15px; font-weight:700; letter-spacing:.07em; text-transform:uppercase; z-index:9999; transform:translateY(20px); opacity:0; transition:transform .2s, opacity .2s; pointer-events:none; }
#toast.show { transform:translateY(0); opacity:1; }
#toast.success { background:var(--lime); color:#000; box-shadow:0 4px 20px rgba(200,255,0,.25); }
#toast.error   { background:var(--red);  color:#fff; }

</style>
</head>
<body>

<aside id="app-sidebar"></aside>

<div class="app-shell">
  <main class="main-content">

    <header class="topbar">
      <button class="topbar-btn" onclick="goLocal()" title="Local Mode">
        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
      </button>
      <button class="topbar-btn" onclick="_navigate('main-settings.html')">
        <div id="topbar-avatar-wrap" style="width:28px;height:28px;border-radius:6px;background:var(--border)"></div>
      </button>
    </header>

    <div class="scroll-area">
      <div class="page-content">

        <div class="page-header">
          <div>
            <div class="page-eyebrow" id="page-eyebrow">Team · Garage</div>
            <div class="page-title">TEAM <span>GARAGE</span></div>
            <div class="page-subtitle">Your team's livery library. Add liveries once — pick them when creating a lineup.</div>
          </div>
          <div class="page-header-actions">
            <button class="btn-ghost" onclick="_navigate('team.html?team_id=' + teamId)">
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 12H5m7-7l-7 7 7 7"/></svg>
              Back
            </button>
            <button class="btn-primary" onclick="openAddModal()">
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Add Livery
            </button>
          </div>
        </div>

        <div class="filter-bar">
          <button class="filter-btn active" data-filter="all"      onclick="setFilter('all',this)">All</button>
          <button class="filter-btn"        data-filter="hypercar" onclick="setFilter('hypercar',this)">Hypercar</button>
          <button class="filter-btn"        data-filter="lmp2"     onclick="setFilter('lmp2',this)">LMP2</button>
          <button class="filter-btn"        data-filter="lmgt3"    onclick="setFilter('lmgt3',this)">LMGT3</button>
          <button class="filter-btn"        data-filter="gte"      onclick="setFilter('gte',this)">GTE</button>
          <div class="filter-search">
            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35"/></svg>
            <input type="text" id="search-input" placeholder="Search livery…" oninput="renderGrid()">
          </div>
        </div>

        <div class="garage-grid" id="garage-grid"></div>

      </div>
    </div>
  </main>
</div>

<!-- ══ MODAL: Add / Edit ══ -->
<div class="modal-overlay" id="modal-livery" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>

    <div class="modal-title" id="modal-title">Add Livery</div>

    <div class="modal-preview" id="modal-preview">
      <div class="preview-empty" id="preview-empty">
        <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="10" rx="2"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></svg>
        <span>Preview</span>
      </div>
      <img id="preview-img" src="" alt="" style="display:none" onerror="onPreviewError()">
    </div>

    <input type="hidden" id="edit-id">

    <div class="form-group">
      <div class="form-label">Livery Name</div>
      <input class="form-input" id="f-name" type="text" placeholder="e.g. #42 Ferrari — Le Mans 2024">
    </div>

    <div class="form-group">
      <div class="form-label">Series</div>
      <div class="series-btns">
        <button type="button" class="series-btn" data-series="wec"  onclick="toggleSeries(this,'wec')">
          <img src="assets/champ/wec.svg"  style="height:14px;filter:brightness(0) invert(1)"> WEC
        </button>
        <button type="button" class="series-btn" data-series="elms" onclick="toggleSeries(this,'elms')">
          <img src="assets/champ/elms.svg" style="height:14px;filter:brightness(0) invert(1)"> ELMS
        </button>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <div class="form-label">Category</div>
        <select class="form-input" id="f-category" onchange="onCategoryChange()">
          <option value="">—</option>
          <option value="hypercar">Hypercar</option>
          <option value="lmp2">LMP2</option>
          <option value="lmgt3">LMGT3</option>
          <option value="gte">GTE</option>
          <option value="custom">Custom</option>
        </select>
      </div>
      <div class="form-group">
        <div class="form-label">Car</div>
        <select class="form-input" id="f-car" onchange="onCarChange()">
          <option value="">—</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <div class="form-label">
        Livery URL
        <span style="color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0;font-family:'Barlow',sans-serif"> — optional</span>
      </div>
      <input class="form-input" id="f-livery" type="url"
        placeholder="racecontrol.gg frontAngle.webp URL"
        style="font-size:12px"
        oninput="onLiveryInput()">
      <div class="form-hint">
        Go to <a href="https://www.racecontrol.gg" target="_blank">racecontrol.gg</a> →
        find your livery → right-click car image → <strong style="color:var(--text)">Copy image address</strong>
      </div>
      <div class="form-warn" id="f-livery-warn"></div>
    </div>

    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" id="modal-save-btn" onclick="saveEntry()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/></svg>
        Add
      </button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
injectSharedCSS()
if (!Auth.requireAuth()) throw ''

renderSidebar('home', 'team')
I18n.apply()

const teamId = Nav.getParam('team_id')
if (!teamId) { _navigate('main.html'); throw '' }

// ─── Storage ──────────────────────────────────────────────────────────────
// Garage = array of livery entries, stored per-team in localStorage.
// No server calls — entirely client-side.
// Schema: { id, name, category, car, series, livery_url, created_at }

const GARAGE_KEY = `pw_garage_${teamId}`

function loadGarage()        { try { return JSON.parse(localStorage.getItem(GARAGE_KEY) || '[]') } catch { return [] } }
function persistGarage(data) { localStorage.setItem(GARAGE_KEY, JSON.stringify(data)) }

// ─── State ────────────────────────────────────────────────────────────────
let garage        = loadGarage()
let currentFilter = 'all'
let _editId       = null
let _series       = ''

// Category metadata (local — not from stint-engine to avoid conflicts)
const CAT_META = {
  hypercar: { short:'HYP',  color:'#e11d48' },
  lmp2:     { short:'LMP2', color:'#3b8fff' },
  lmgt3:    { short:'GT3',  color:'#ff8c00' },
  gte:      { short:'GTE',  color:'#22c55e' },
  custom:   { short:'CST',  color:'#a855f7' },
}

// ─── Init ─────────────────────────────────────────────────────────────────
async function init() {
  const userData = await Auth.getUser()
  if (userData?.user?.steam_avatar) {
    const wrap = document.getElementById('topbar-avatar-wrap')
    if (wrap) {
      const img = document.createElement('img')
      img.src = userData.user.steam_avatar
      img.style.cssText = 'width:28px;height:28px;border-radius:6px;object-fit:cover'
      wrap.replaceWith(img)
    }
  }
  const teamName = Nav.getParam('team_name')
  if (teamName) document.getElementById('page-eyebrow').textContent = `${teamName} · Garage`
  renderGrid()
}

// ─── Filter ───────────────────────────────────────────────────────────────
function setFilter(f, btn) {
  currentFilter = f
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
  renderGrid()
}

function matchesFilter(e) {
  if (currentFilter !== 'all' && e.category !== currentFilter) return false
  const q = (document.getElementById('search-input')?.value || '').toLowerCase().trim()
  if (q) {
    const carLabel = getCarLabel(e.car)
    const hay = [e.name, e.category, carLabel, e.series].join(' ').toLowerCase()
    if (!hay.includes(q)) return false
  }
  return true
}

// ─── Render ───────────────────────────────────────────────────────────────
function getCarLabel(carId) {
  if (!carId) return ''
  if (typeof CARS !== 'undefined' && CARS[carId]) return CARS[carId].label
  return carId
}

function renderGrid() {
  const grid     = document.getElementById('garage-grid')
  const filtered = garage.filter(matchesFilter)

  const addCard = `
    <div class="livery-add-card" onclick="openAddModal()">
      <div class="add-icon-circle">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </div>
      <div class="add-label">Add Livery</div>
    </div>`

  if (garage.length === 0) {
    grid.innerHTML = addCard + `
      <div class="empty-state">
        <div class="empty-state-icon">
          <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <rect x="2" y="7" width="20" height="10" rx="2"/>
            <path d="M4 7V5.5a2.5 2.5 0 015 0V7m6 0V5.5a2.5 2.5 0 015 0V7"/>
            <circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/>
          </svg>
        </div>
        <div class="empty-state-title">Garage is empty</div>
        <div class="empty-state-sub">Add your team's liveries here. You'll be able to pick them when creating a lineup.</div>
      </div>`
    return
  }

  if (filtered.length === 0) {
    grid.innerHTML = addCard + `
      <div class="empty-state">
        <div class="empty-state-title">No results</div>
        <div class="empty-state-sub">No liveries match this filter.</div>
      </div>`
    return
  }

  grid.innerHTML = filtered.map(cardHTML).join('') + addCard
}

function cardHTML(e) {
  const meta     = CAT_META[e.category] || {}
  const color    = meta.color || 'var(--border-hi)'
  const short    = meta.short || (e.category || '')
  const carLabel = getCarLabel(e.car)

  const imgSrc = e.livery_url
    || (e.car && typeof carFrontThumb === 'function' ? carFrontThumb(e.car) : '')
    || ''

  const tags = []
  if (short)    tags.push(`<span class="lc-tag" style="color:${color};border:1px solid ${color}40;background:${color}12">${short}</span>`)
  if (carLabel) tags.push(`<span class="lc-tag lc-tag-car">${esc(carLabel)}</span>`)
  if (e.series) tags.push(`<span class="lc-tag lc-tag-series">${esc(e.series.toUpperCase())}</span>`)

  const urlRow = e.livery_url
    ? `<div class="livery-card-url" title="${esc(e.livery_url)}">${esc(e.livery_url.replace(/^https?:\/\//,'').substring(0,38))}…</div>`
    : `<div style="font-size:10px;color:var(--muted)">No livery URL — car thumbnail only</div>`

  return `
  <div class="livery-card">
    <div class="livery-card-accent" style="background:${color}"></div>
    <div class="livery-card-visual">
      ${imgSrc
        ? `<img class="livery-car-img" src="${esc(imgSrc)}" alt="" onerror="this.style.display='none'">`
        : `<div class="livery-car-placeholder">
            <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="10" rx="2"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></svg>
            <span>No image</span>
           </div>`}
    </div>
    <div class="livery-card-body">
      <div class="livery-card-name" title="${esc(e.name)}">${esc(e.name)}</div>
      ${tags.length ? `<div class="livery-card-tags">${tags.join('')}</div>` : ''}
      ${urlRow}
    </div>
    <div class="livery-card-footer">
      <button class="lc-btn" onclick="openEditModal('${esc(e.id)}')">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Edit
      </button>
      <button class="lc-btn" onclick="copyUrl('${esc(e.id)}')" title="Copy livery URL">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        Copy URL
      </button>
      <button class="lc-btn danger" onclick="deleteEntry('${esc(e.id)}')">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
      </button>
    </div>
  </div>`
}

// ─── Modal: Add ───────────────────────────────────────────────────────────
function openAddModal() {
  _editId = null; _series = ''
  document.getElementById('modal-title').textContent = 'Add Livery'
  document.getElementById('modal-save-btn').childNodes[2].textContent = ' Add'
  document.getElementById('edit-id').value    = ''
  document.getElementById('f-name').value     = ''
  document.getElementById('f-category').value = ''
  document.getElementById('f-car').innerHTML  = '<option value="">—</option>'
  document.getElementById('f-livery').value   = ''
  document.getElementById('f-livery-warn').style.display = 'none'
  document.querySelectorAll('.series-btn').forEach(b => b.classList.remove('active'))
  refreshPreview()
  document.getElementById('modal-livery').classList.add('active')
  setTimeout(() => document.getElementById('f-name').focus(), 80)
}

// ─── Modal: Edit ──────────────────────────────────────────────────────────
function openEditModal(id) {
  const e = garage.find(x => x.id === id)
  if (!e) return
  _editId = id; _series = e.series || ''
  document.getElementById('modal-title').textContent = 'Edit Livery'
  document.getElementById('modal-save-btn').childNodes[2].textContent = ' Save'
  document.getElementById('edit-id').value    = id
  document.getElementById('f-name').value     = e.name || ''
  document.getElementById('f-category').value = e.category || ''
  refreshCarSelect(e.car || '')
  document.getElementById('f-livery').value   = e.livery_url || ''
  document.getElementById('f-livery-warn').style.display = 'none'
  document.querySelectorAll('.series-btn').forEach(b => b.classList.toggle('active', b.dataset.series === _series))
  refreshPreview()
  document.getElementById('modal-livery').classList.add('active')
}

function closeModal() {
  document.getElementById('modal-livery').classList.remove('active')
}

// ─── Form helpers ─────────────────────────────────────────────────────────
function toggleSeries(btn, s) {
  const was = btn.classList.contains('active')
  document.querySelectorAll('.series-btn').forEach(b => b.classList.remove('active'))
  _series = was ? '' : s
  if (!was) btn.classList.add('active')
}

function onCategoryChange() { refreshCarSelect(''); refreshPreview(); checkMismatch() }
function onCarChange()      { refreshPreview(); checkMismatch() }
function onLiveryInput()    { refreshPreview(); checkMismatch() }

function refreshCarSelect(selectedCar) {
  const cat = document.getElementById('f-category').value
  const sel = document.getElementById('f-car')
  sel.innerHTML = '<option value="">—</option>'
  if (cat && typeof carsForCategory === 'function') {
    carsForCategory(cat).forEach(([id, c]) => {
      sel.innerHTML += `<option value="${id}" ${id === selectedCar ? 'selected':''}>${c.label}</option>`
    })
  } else if (selectedCar) {
    sel.innerHTML += `<option value="${selectedCar}" selected>${getCarLabel(selectedCar)}</option>`
  }
}

function refreshPreview() {
  const livery = document.getElementById('f-livery').value.trim()
  const carId  = document.getElementById('f-car').value
  const img    = document.getElementById('preview-img')
  const empty  = document.getElementById('preview-empty')
  const src    = livery || (carId && typeof carFrontThumb === 'function' ? carFrontThumb(carId) : '') || ''
  if (src) { img.src = src; img.style.display = ''; empty.style.display = 'none' }
  else     { img.style.display = 'none'; empty.style.display = 'flex' }
}

function onPreviewError() {
  document.getElementById('preview-img').style.display  = 'none'
  document.getElementById('preview-empty').style.display = 'flex'
}

function checkMismatch() {
  const url  = document.getElementById('f-livery').value.trim()
  const car  = document.getElementById('f-car').value
  const warn = document.getElementById('f-livery-warn')
  if (!url || !car || typeof detectCarFromLiveryUrl !== 'function') { warn.style.display = 'none'; return }
  const detected = detectCarFromLiveryUrl(url)
  if (!detected || detected.id === car) { warn.style.display = 'none'; return }
  warn.textContent = `⚠ Mismatch: livery is a ${detected.label}, but you selected ${getCarLabel(car)}`
  warn.style.display = ''
}

// ─── Save ─────────────────────────────────────────────────────────────────
function saveEntry() {
  const name = document.getElementById('f-name').value.trim()
  if (!name) { document.getElementById('f-name').focus(); return }

  const entry = {
    id:         _editId || `liv_${Date.now()}_${Math.random().toString(36).slice(2,7)}`,
    name,
    category:   document.getElementById('f-category').value,
    car:        document.getElementById('f-car').value,
    series:     _series,
    livery_url: document.getElementById('f-livery').value.trim(),
    created_at: _editId ? (garage.find(e => e.id === _editId)?.created_at || Date.now()) : Date.now(),
  }

  if (_editId) {
    const idx = garage.findIndex(e => e.id === _editId)
    if (idx !== -1) garage[idx] = entry
    toast('Livery updated', 'success')
  } else {
    garage.unshift(entry)
    toast('Livery added to garage', 'success')
  }

  persistGarage(garage)
  closeModal()
  renderGrid()
}

// ─── Delete ───────────────────────────────────────────────────────────────
function deleteEntry(id) {
  garage = garage.filter(e => e.id !== id)
  persistGarage(garage)
  renderGrid()
  toast('Livery removed', 'success')
}

// ─── Copy URL ─────────────────────────────────────────────────────────────
function copyUrl(id) {
  const e = garage.find(x => x.id === id)
  if (!e?.livery_url) { toast('No URL set for this livery', 'error'); return }
  navigator.clipboard.writeText(e.livery_url)
    .then(() => toast('URL copied!', 'success'))
    .catch(() => toast('Could not copy', 'error'))
}

// ─── Utils ────────────────────────────────────────────────────────────────
function goLocal() {
  localStorage.removeItem('pw_active_lineup')
  localStorage.removeItem('pw_active_lineup_name')
  _navigate('pitwall.html')
}

let _toastTimer
function toast(msg, type = 'success') {
  const el = document.getElementById('toast')
  el.textContent = msg
  el.className = `show ${type}`
  clearTimeout(_toastTimer)
  _toastTimer = setTimeout(() => { el.className = '' }, 2800)
}

init()
</script>
</body>
</html>
